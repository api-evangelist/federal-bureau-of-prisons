name: Federal Bureau of Prisons
description: >-
  The Federal Bureau of Prisons (BOP) is responsible for the custody and care
  of federal inmates in the United States. The BOP operates the inmate locator
  and publishes facility information online but does not currently offer a
  public, documented developer API.
